databases:
  - name: dumpring-db
    databaseName: dumpring
    user: dumpring_user

services:
  - type: web
    name: dumpring-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dumpring-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
